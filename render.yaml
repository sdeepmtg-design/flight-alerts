# Blueprint: https://dashboard.render.com/blueprints
# Web Service (free) + Postgres (free). Cron — cron-job.org (см. README).
databases:
  - name: flight-alerts-db
    databaseName: flight_alerts
    user: flight_alerts
    plan: free
    region: frankfurt

services:
  - type: web
    name: flight-alerts-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flight-alerts-db
          property: connectionString
      - key: CHECK_INTERVAL_HOURS
        value: "4"
      - key: TRAVELPAYOUTS_TOKEN
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: CRON_SECRET
        generateValue: true
